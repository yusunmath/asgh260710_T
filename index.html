<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>선생님용 · 출석 확인(수정)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --ink:#1c1b1a; --ink2:#57534e; --ink3:#8a857e;
    --paper:#f6f4ef; --card:#ffffff; --line:#e7e3db;
    --school:#0f766e; --school-bg:#e5f3f0;
    --bus:#b45309; --bus-bg:#fbf0dc;
    --walk:#4338ca; --walk-bg:#e9e8fb;
    --ok:#0f766e; --ok-bg:#e5f3f0;
    --no:#c2410c; --no-bg:#fbeae1; --no-line:#eebfa2;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:20px 16px 60px;min-height:100vh}
  .eyebrow{font-size:12px;font-weight:600;color:var(--ink3);letter-spacing:.02em}
  h1{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:3px 0 14px}

  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{flex:1;min-width:72px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center}
  .chip .n{font-size:20px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .chip .l{font-size:11px;color:var(--ink3);font-weight:600;margin-top:1px}

  .gsearch{display:flex;gap:8px;margin-bottom:8px}
  .gsearch input{flex:1;font-family:inherit;font-size:15px;color:var(--ink);background:var(--card);border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;outline:none}
  .gsearch input:focus{border-color:var(--ink)}
  #findResult{margin:2px 0 14px;font-size:13px;color:var(--ink2)}
  #findResult .hit{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 13px;margin-top:7px}
  #findResult .hit .nm{font-weight:800}
  #findResult .hit .gg{margin-top:4px;font-size:12.5px;color:var(--ink2);line-height:1.6}

  .cat{margin:18px 0 8px;font-size:13px;font-weight:800;color:var(--ink2);letter-spacing:.01em;display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:3px}
  .dot.school{background:var(--school)} .dot.bus{background:var(--bus)} .dot.walk{background:var(--walk)}

  .gcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;margin-bottom:9px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .06s}
  .gcard:active{transform:scale(.99)}
  .gcard .gmain{flex:1;min-width:0}
  .gcard .gname{font-size:16px;font-weight:800;letter-spacing:-.01em}
  .gcard .gmeta{font-size:12.5px;color:var(--ink3);margin-top:2px;font-weight:600}
  .gcard .gmeta b{color:var(--ink2);font-weight:700}
  .gcard .gcount{flex:0 0 auto;text-align:center;min-width:52px}
  .gcard .gcount .cn{font-size:22px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
  .gcard .gcount .cl{font-size:10.5px;color:var(--ink3);font-weight:700;margin-top:2px}
  .gcard .chev{flex:0 0 auto;color:var(--ink3);font-size:20px}
  .lschool{border-left:4px solid var(--school)}
  .lbus{border-left:4px solid var(--bus)}
  .lwalk{border-left:4px solid var(--walk)}

  .hidden{display:none}
  .back{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:var(--ink2);background:none;border:none;padding:6px 0;cursor:pointer;margin-bottom:8px;font-family:inherit}
  .rhead{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:10px}
  .rhead .rt{font-size:19px;font-weight:800;letter-spacing:-.01em}
  .rhead .rm{font-size:13px;color:var(--ink2);margin-top:3px;font-weight:600}
  .rhead .rm b{color:var(--ink)}
  .counter{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
  .counter .big{font-size:15px;font-weight:800;white-space:nowrap}
  .counter .big .on{color:var(--ok)} .counter .big .sl{color:var(--ink3);margin:0 3px}
  .counter .big .ab{color:var(--no);margin-left:8px;font-size:13.5px}
  .counter .bar{flex:1;height:8px;background:var(--no-bg);border-radius:99px;overflow:hidden}
  .counter .bar i{display:block;height:100%;background:var(--ok);width:100%;transition:width .2s}

  .guide{font-size:12px;color:var(--ink3);margin:0 2px 10px;line-height:1.5}
  .guide b{color:var(--no);font-weight:800}
  .rtools{display:flex;gap:8px;margin-bottom:10px}
  .rtools input{flex:1;font-family:inherit;font-size:14px;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;outline:none}
  .rtools input:focus{border-color:var(--ink)}
  .btn{font-family:inherit;font-size:13px;font-weight:700;border:1.5px solid var(--line);background:var(--card);color:var(--ink2);border-radius:10px;padding:9px 12px;cursor:pointer;white-space:nowrap}
  .btn:active{background:var(--paper)}

  ul.roster{list-style:none;margin:0;padding:0;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  ul.roster li{display:flex;align-items:center;gap:12px;padding:12px 15px;border-top:1px solid var(--line);cursor:pointer}
  ul.roster li:first-child{border-top:none}
  ul.roster li.off{background:var(--no-bg)}
  .idx{flex:0 0 auto;width:22px;font-size:12px;color:var(--ink3);font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
  .sid{flex:0 0 auto;font-size:14px;color:var(--ink2);font-weight:700;font-variant-numeric:tabular-nums;width:44px}
  .nm{flex:1;min-width:0;font-size:16px;font-weight:700}
  li.off .nm{color:var(--no)}
  .bus{flex:0 0 auto;font-size:11.5px;font-weight:800;color:var(--bus);background:var(--bus-bg);padding:3px 8px;border-radius:99px}
  li.off .bus{opacity:.55}
  .status{flex:0 0 auto;min-width:56px;text-align:center;font-size:12.5px;font-weight:800;padding:5px 0;border-radius:8px}
  li:not(.off) .status{color:var(--ok);background:var(--ok-bg)}
  li.off .status{color:#fff;background:var(--no)}
  .rfoot{margin-top:12px}
  .absent{font-size:13px;color:var(--ink2);line-height:1.7;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .absent .hd{font-weight:800;color:var(--no)}
  .absent .ok{font-weight:800;color:var(--ok)}
  .note{font-size:11.5px;color:var(--ink3);text-align:center;margin-top:22px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div id="home">
    <div class="eyebrow">2026학년도 1학기말 · 1·2학년 진로탐색 프로그램 (최종)</div>
    <h1>선생님용 · 출석 확인(수정)</h1>
    <div class="chips" id="chips"></div>
    <div class="gsearch"><input id="find" placeholder="학번·이름으로 학생 위치 찾기" autocomplete="off"></div>
    <div id="findResult"></div>
    <div id="groupList"></div>
    <p class="note">기본값은 전원 출석입니다. 결석·미참여 학생만 체크하세요. 체크 기록은 이 기기(브라우저)에만 저장되며, 다른 선생님 기기와 자동으로 공유되지 않습니다.</p>
  </div>

  <div id="roster" class="hidden">
    <button class="back" id="back">‹ 그룹 목록</button>
    <div class="rhead" id="rhead"></div>
    <p class="guide">모두 출석 상태입니다. <b>결석인 학생만 눌러</b> 미출석으로 표시하세요.</p>
    <div class="rtools">
      <input id="rfilter" placeholder="이름·학번 검색" autocomplete="off">
      <button class="btn" id="resetAll">모두 출석</button>
    </div>
    <ul class="roster" id="rlist"></ul>
    <div class="rfoot"><div class="absent" id="absent"></div></div>
  </div>
</div>

const GROUPS = DATA.groups;
const META = DATA.meta;
const $ = id => document.getElementById(id);
const norm = s => (s||'').replace(/\s+/g,'').trim();
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

// storage holds ABSENT sids per group; graceful fallback
const mem={};
function load(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):[]}catch(e){return mem[k]||[]} }
function save(k,a){ try{localStorage.setItem(k,JSON.stringify(a))}catch(e){mem[k]=a} }

const catClass=c=>c.startsWith('교내')?'school':(c.startsWith('두원')?'bus':'walk');

function renderChips(){
  const t=META.cat_totals;
  const items=[['전체',META.total],['교내 특강',t['교내 · 1·2교시']||0],['두원공대',t['두원공대 · 버스']||0],['한경대',t['한경대 · 도보']||0]];
  $('chips').innerHTML=items.map(([l,n])=>`<div class="chip"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
}
function renderGroups(){
  const cats=[]; GROUPS.forEach(g=>{if(!cats.includes(g.cat))cats.push(g.cat)});
  let html='';
  cats.forEach(cat=>{
    const cc=catClass(cat);
    html+=`<div class="cat"><span class="dot ${cc}"></span>${esc(cat)}</div>`;
    GROUPS.filter(g=>g.cat===cat).forEach(g=>{
      html+=`<div class="gcard l${cc}" data-id="${g.id}">
        <div class="gmain"><div class="gname">${esc(g.name)}</div>
        <div class="gmeta">${esc(g.sub)} · 임장 <b>${esc(g.teacher)}</b></div></div>
        <div class="gcount"><div class="cn">${g.students.length}</div><div class="cl">명</div></div>
        <div class="chev">›</div></div>`;
    });
  });
  $('groupList').innerHTML=html;
  document.querySelectorAll('.gcard').forEach(el=>{el.onclick=()=>openRoster(el.dataset.id)});
}
$('find').addEventListener('input',e=>{
  const q=norm(e.target.value),box=$('findResult');
  if(!q){box.innerHTML='';return;}
  const seen={};
  GROUPS.forEach(g=>g.students.forEach(s=>{
    if(s.sid.includes(q)||norm(s.name).includes(q))(seen[s.sid]=seen[s.sid]||{name:s.name,sid:s.sid,groups:[]}).groups.push(g);
  }));
  const hits=Object.values(seen).slice(0,8);
  box.innerHTML=hits.length?hits.map(h=>`<div class="hit">
    <div class="nm">${esc(h.name)} <span style="color:#8a857e;font-weight:600;font-size:13px">${esc(h.sid)}</span></div>
    <div class="gg">${h.groups.map(g=>`· ${esc(g.cat)} — <b>${esc(g.name)}</b> (${esc(g.sub)}, 임장 ${esc(g.teacher)})`).join('<br>')}</div>
  </div>`).join(''):`<div class="hit">일치하는 학생이 없습니다.</div>`;
});

let cur=null;
function keyFor(){return 'absent:'+cur.id;}
function openRoster(id){
  cur=GROUPS.find(g=>g.id===id);
  $('home').classList.add('hidden'); $('roster').classList.remove('hidden');
  $('rfilter').value='';
  $('rhead').innerHTML=`<div class="rt">${esc(cur.name)}</div>
    <div class="rm">${esc(cur.cat)} · ${esc(cur.sub)} · 임장 <b>${esc(cur.teacher)}</b></div>
    <div class="counter">
      <div class="big">출석 <span class="on" id="cOn">0</span><span class="sl">/</span>${cur.students.length}<span class="ab" id="cAb"></span></div>
      <div class="bar"><i id="cBar"></i></div>
    </div>`;
  renderRoster(); window.scrollTo({top:0});
}
function renderRoster(){
  const absent=new Set(load(keyFor()));
  const filt=norm($('rfilter').value);
  let html='';
  cur.students.forEach((s,i)=>{
    if(filt&&!s.sid.includes(filt)&&!norm(s.name).includes(filt))return;
    const off=absent.has(s.sid);
    html+=`<li class="${off?'off':''}" data-sid="${s.sid}">
      <span class="idx">${i+1}</span>
      <span class="sid">${esc(s.sid)}</span>
      <span class="nm">${esc(s.name)}</span>
      ${s.bus?`<span class="bus">${esc(s.bus)}</span>`:''}
      <span class="status">${off?'미출석':'출석'}</span>
    </li>`;
  });
  $('rlist').innerHTML=html;
  document.querySelectorAll('#rlist li').forEach(li=>{li.onclick=()=>toggle(li.dataset.sid)});
  updateCount();
}
function toggle(sid){
  const set=new Set(load(keyFor()));
  if(set.has(sid))set.delete(sid);else set.add(sid);
  save(keyFor(),[...set]); renderRoster();
}
function updateCount(){
  const absent=new Set(load(keyFor()));
  const tot=cur.students.length;
  const ab=cur.students.filter(s=>absent.has(s.sid));
  const on=tot-ab.length;
  if($('cOn'))$('cOn').textContent=on;
  if($('cAb'))$('cAb').textContent=ab.length?`· 미출석 ${ab.length}명`:'';
  if($('cBar'))$('cBar').style.width=(tot?on/tot*100:0)+'%';
  $('absent').innerHTML=ab.length
    ? `<span class="hd">미출석 ${ab.length}명</span><br>${ab.map((s,i)=>`${i+1}. ${esc(s.name)} <span style="color:#8a857e;font-weight:600">${esc(s.sid)}</span>`).join('<br>')}`
    : `<span class="ok">전원 출석</span> · 미출석 학생이 없습니다.`;
}
$('rfilter').addEventListener('input',renderRoster);
$('resetAll').onclick=()=>{ if(confirm('이 그룹을 모두 출석 상태로 되돌릴까요?')){ save(keyFor(),[]); renderRoster(); } };
$('back').onclick=()=>{ $('roster').classList.add('hidden'); $('home').classList.remove('hidden'); window.scrollTo({top:0}); };

renderChips(); renderGroups();
</script>
